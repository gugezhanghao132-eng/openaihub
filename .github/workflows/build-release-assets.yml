name: Build OpenAI Hub release assets

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'openaihub-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build requirements
        run: python -m pip install --upgrade pip && python -m pip install -r scripts/build-requirements.txt

      - name: Build Windows runtime
        env:
          PYTHONHASHSEED: '0'
          SOURCE_DATE_EPOCH: '0'
        run: python -m PyInstaller openaihub.spec -y --distpath dist --workpath build_release_ci/work --clean

      - name: Archive Windows runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          if (Test-Path release-assets/openaihub-windows.zip) { Remove-Item release-assets/openaihub-windows.zip -Force }
          Compress-Archive -Path dist/openaihub/* -DestinationPath release-assets/openaihub-windows.zip -Force

      - name: Verify Windows runtime archive
        run: python scripts/verify_release_asset.py --asset release-assets/openaihub-windows.zip --platform windows --runtime-root dist/openaihub

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/openaihub-windows.zip

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            expected_asset: openaihub-macos-x64.tar.gz
            runtime_dir: openaihub-macos-x64
          - runner: macos-14
            expected_asset: openaihub-macos-arm64.tar.gz
            runtime_dir: openaihub-macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build requirements
        run: python3 -m pip install --upgrade pip && python3 -m pip install -r scripts/build-requirements.txt

      - name: Build macOS runtime
        env:
          PYTHONHASHSEED: '0'
          SOURCE_DATE_EPOCH: '0'
        run: bash scripts/build-macos.sh

      - name: Verify expected macOS asset exists
        run: test -f "release-assets/${{ matrix.expected_asset }}"

      - name: Verify macOS runtime archive
        run: python3 scripts/verify_release_asset.py --asset "release-assets/${{ matrix.expected_asset }}" --platform macos --runtime-root "dist/${{ matrix.runtime_dir }}"

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/${{ matrix.expected_asset }}
